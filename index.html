<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="assets/icons/favicon.png">
    <title>AnimeAho</title>
</head>
<body>
    <header class="header">
        <div class="header__inner">
            <a href="index.html">
                <img src="assets/images/logo-animeaho.png" alt="AnimeAho" class="header__logo">
            </a>

            <div class="header__search">
                <input type="search" placeholder="Buscar..." aria-label="Buscar anime">
                <a href="" aria-label="Buscar">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF" aria-hidden="true">
                        <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
                    </svg>
                </a>
            </div>

            <nav class="header__nav" aria-label="Navegación principal">
                <a href="index.html">INICIO</a>
                <a href="">ANIMES</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="main__inner">

            <aside class="main__sidebar">
                <h3 class="main__sidebar-title">Animes En Emisión</h3>
                <ul id="airing-animes" class="main__airing-list"></ul>
            </aside>

            <div class="main__content">
                <section class="main__section">
                    <h3 class="main__section-title">Últimos Episodios</h3>
                    <div id="latest-episodes" class="main__animes-container"></div>
                </section>
                <section class="main__section">
                    <h3 class="main__section-title">Últimos Animes Agregados</h3>
                    <div id="latest-animes" class="main__animes-container"></div>
                </section>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="footer__inner">
            <small>&copy; AnimeAho - Todos los derechos reservados</small>
        </div>
    </footer>

    <script type="module" src="js/pages/index.js"></script>
</body>
</html>
